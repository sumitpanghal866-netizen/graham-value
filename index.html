<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GrahamValue Pro</title>

<link rel="stylesheet" href="style.css">

<meta name="theme-color" content="#0F172A">

</head>

<body>

<div class="container">

<div class="header">

<h1>📈 GrahamValue Pro</h1>

<p>Benjamin Graham Intrinsic Value Calculator</p>

</div>

<div class="card">

<input
id="stock"
type="text"
placeholder="Enter Stock Symbol (AAPL, MSFT, TCS.NS)"
>

<button id="searchBtn">
Analyze Stock
</button>

</div>

<div class="card">

<h2>Company</h2>

<p id="company">-</p>

<h2>Current Price</h2>

<p id="price">-</p>

<h2>EPS</h2>

<p id="eps">-</p>

<h2>Book Value</h2>

<p id="book">-</p>

</div>

<div class="card result">

<h2>Intrinsic Value</h2>

<h1 id="intrinsic">-</h1>

<p id="mos"></p>

<h2 id="rating"></h2>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
